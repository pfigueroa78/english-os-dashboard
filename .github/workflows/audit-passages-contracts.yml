name: Audit Passages Contracts

on:
  workflow_dispatch:
    inputs:
      unit:
        description: "Unit number to audit. Use 0 to audit all units."
        required: true
        default: "2"
      knowledge_path:
        description: "Folder containing Passages class packs"
        required: true
        default: "knowledge/class-packs-lesson-vision"
      fail_on_warnings:
        description: "Fail workflow on warnings as well as errors"
        required: true
        default: "false"

permissions:
  contents: read

jobs:
  audit-contracts:
    runs-on: ubuntu-latest

    env:
      ENGLISH_OS_BASE_URL: ${{ secrets.ENGLISH_OS_BASE_URL }}
      ENGLISH_OS_TOKEN: ${{ secrets.ENGLISH_OS_TOKEN }}
      UNIT: ${{ github.event.inputs.unit }}
      KNOWLEDGE_PATH: ${{ github.event.inputs.knowledge_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run contract audit
        shell: bash
        run: |
          set -uo pipefail

          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.fail_on_warnings }}" = "true" ]; then
            EXTRA_ARGS="--fail-on-warnings"
          fi

          npm run passages:audit-contracts -- \
            --knowledge-path "${KNOWLEDGE_PATH}" \
            --unit "${UNIT}" \
            --json \
            ${EXTRA_ARGS} > passages-contract-audit.json
          AUDIT_EXIT="$?"

          npm run passages:audit-contracts -- \
            --knowledge-path "${KNOWLEDGE_PATH}" \
            --unit "${UNIT}" \
            ${EXTRA_ARGS} > passages-contract-audit.md || true

          echo "AUDIT_EXIT=${AUDIT_EXIT}" >> "${GITHUB_ENV}"

      - name: Publish audit result to English OS sheet
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          npm run passages:publish-result -- \
            --workflow "Audit Passages Contracts" \
            --status "audit_exit_${AUDIT_EXIT:-unknown}" \
            --unit "${UNIT}" \
            --knowledge-path "${KNOWLEDGE_PATH}" \
            --audit-json passages-contract-audit.json \
            --markdown-file passages-contract-audit.md

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: passages-contract-audit-unit-${{ github.event.inputs.unit }}
          path: |
            passages-contract-audit.md
            passages-contract-audit.json

      - name: Fail if audit failed
        shell: bash
        run: |
          set -euo pipefail
          if [ "${AUDIT_EXIT:-1}" != "0" ]; then
            echo "Passages contract audit failed with exit code ${AUDIT_EXIT}."
            exit "${AUDIT_EXIT}"
          fi
