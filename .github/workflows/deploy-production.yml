name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production-main
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VERCEL_TOKEN}" || { echo "Missing VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_ORG_ID}" || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          test -n "${VERCEL_PROJECT_ID}" || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Pull Vercel production environment
        shell: bash
        run: npx vercel pull --yes --environment=production --token "${VERCEL_TOKEN}"

      - name: Deploy production
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_URL=$(npx vercel deploy --prod --yes --token "${VERCEL_TOKEN}" | tail -n 1)
          echo "Deployment URL: ${DEPLOY_URL}"

      - name: Smoke test MCP unauthorized response
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /tmp/mcp.txt -w "%{http_code}" "https://english-os-dashboard.vercel.app/api/mcp" || true)
          echo "MCP unauthenticated status: ${STATUS}"
          cat /tmp/mcp.txt || true
          if [ "${STATUS}" != "401" ]; then
            echo "Expected MCP endpoint to return 401 without token."
            exit 1
          fi
