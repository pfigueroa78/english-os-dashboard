name: QA Student Playwright

on:
  workflow_dispatch:
    inputs:
      qa_base_url:
        description: "Base URL to test"
        required: false
        default: "https://english-os-dashboard.vercel.app"
      qa_email:
        description: "QA learner email"
        required: false
        default: "pfigueroamiranda@gmail.com"
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: qa-student-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-student-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      QA_BASE_URL: ${{ github.event.inputs.qa_base_url || 'https://english-os-dashboard.vercel.app' }}
      QA_STUDENT_EMAIL: ${{ github.event.inputs.qa_email || 'pfigueroamiranda@gmail.com' }}
      ENGLISH_OS_QA_TOKEN: ${{ secrets.ENGLISH_OS_QA_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate QA secret
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ENGLISH_OS_QA_TOKEN}" || { echo "Missing repository secret ENGLISH_OS_QA_TOKEN"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run QA student journey
        run: npx playwright test tests/e2e/qa-student-flow.spec.ts --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 7
