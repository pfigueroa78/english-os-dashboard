name: Refresh Passages Vector Store

on:
  workflow_dispatch:
    inputs:
      knowledge_path:
        description: "Folder containing final Passages class packs"
        required: true
        default: "knowledge/class-packs"
      diagnostic_unit:
        description: "Unit number to verify after deploy"
        required: true
        default: "1"
      diagnostic_class:
        description: "Local class number to verify after deploy"
        required: true
        default: "4"

permissions:
  contents: read

env:
  NODE_ENV: production

jobs:
  refresh-vector-store:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      KNOWLEDGE_PATH: ${{ github.event.inputs.knowledge_path }}
      DIAGNOSTIC_UNIT: ${{ github.event.inputs.diagnostic_unit }}
      DIAGNOSTIC_CLASS: ${{ github.event.inputs.diagnostic_class }}
      PRODUCTION_DOMAIN: english-os-dashboard.vercel.app
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      ENGLISH_OS_BASE_URL: ${{ secrets.ENGLISH_OS_BASE_URL }}
      ENGLISH_OS_TOKEN: ${{ secrets.ENGLISH_OS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          test -n "${OPENAI_API_KEY}" || { echo "Missing OPENAI_API_KEY"; exit 1; }
          test -n "${VERCEL_TOKEN}" || { echo "Missing VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_ORG_ID}" || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          test -n "${VERCEL_PROJECT_ID}" || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate class packs folder
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "${KNOWLEDGE_PATH}" ]; then
            echo "Knowledge path does not exist: ${KNOWLEDGE_PATH}"
            exit 1
          fi

          COUNT=$(find "${KNOWLEDGE_PATH}" -maxdepth 1 -type f -name "*.md" | wc -l | tr -d ' ')
          echo "Found ${COUNT} markdown class packs in ${KNOWLEDGE_PATH}"

          if [ "${COUNT}" -lt 84 ]; then
            echo "Expected at least 84 markdown class packs."
            exit 1
          fi

      - name: Build fresh OpenAI vector store
        id: build_vector_store
        shell: bash
        run: |
          set -euo pipefail

          node scripts/openai-passages-knowledge.mjs \
            --knowledge-path "${KNOWLEDGE_PATH}" \
            --fresh \
            --emit-github-output

      - name: Link Vercel project
        shell: bash
        run: npx vercel pull --yes --environment=production --token "${VERCEL_TOKEN}"

      - name: Update Vercel production env
        shell: bash
        run: |
          set -euo pipefail

          NEW_VECTOR_STORE_ID="${{ steps.build_vector_store.outputs.vector_store_id }}"

          if [ -z "${NEW_VECTOR_STORE_ID}" ]; then
            echo "Missing vector_store_id output."
            exit 1
          fi

          echo "Updating OPENAI_PASSAGES_VECTOR_STORE_ID in Vercel production."
          npx vercel env rm OPENAI_PASSAGES_VECTOR_STORE_ID production --yes --token "${VERCEL_TOKEN}" || true
          printf "%s" "${NEW_VECTOR_STORE_ID}" | npx vercel env add OPENAI_PASSAGES_VECTOR_STORE_ID production --token "${VERCEL_TOKEN}"

      - name: Deploy production to Vercel
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_URL=$(npx vercel deploy --prod --yes --token "${VERCEL_TOKEN}" | tail -n 1)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: ${DEPLOY_URL}"

      - name: Wait for production alias
        shell: bash
        run: |
          set -euo pipefail

          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /tmp/health.txt -w "%{http_code}" "https://${PRODUCTION_DOMAIN}/api/english-os/debug/passages?unit=${DIAGNOSTIC_UNIT}&class=${DIAGNOSTIC_CLASS}" || true)
            echo "Attempt ${i}: ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              exit 0
            fi
            sleep 10
          done

          echo "Production alias did not become ready in time."
          cat /tmp/health.txt || true
          exit 1

      - name: Run diagnostic endpoint
        id: diagnostic
        shell: bash
        run: |
          set -euo pipefail

          DIAGNOSTIC_URL="https://${PRODUCTION_DOMAIN}/api/english-os/debug/passages?unit=${DIAGNOSTIC_UNIT}&class=${DIAGNOSTIC_CLASS}"
          echo "Diagnostic URL: ${DIAGNOSTIC_URL}"

          curl -sS "${DIAGNOSTIC_URL}" -o diagnostic.json
          cat diagnostic.json | node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync(0, "utf8"));
            const ok = Boolean(data?.fileSearch?.expectedFileFound && data?.fileSearch?.contractFound);
            const summary = {
              ok,
              diagnosis: data?.diagnosis || "",
              vectorStoreIdMasked: data?.env?.vectorStoreIdMasked || "",
              expectedFileFound: data?.fileSearch?.expectedFileFound || false,
              contractFound: data?.fileSearch?.contractFound || false,
              activeClassSectionNames: data?.fileSearch?.detected?.activeClassSectionNames || "",
              activeClassGrammarFocus: data?.fileSearch?.detected?.activeClassGrammarFocus || "",
            };
            fs.writeFileSync("diagnostic-summary.json", JSON.stringify(summary, null, 2));
            console.log(JSON.stringify(summary, null, 2));
            process.exit(ok ? 0 : 2);
          ' || echo "diagnostic_exit=$?" >> "$GITHUB_OUTPUT"

          if ! grep -q '^diagnostic_exit=' "$GITHUB_OUTPUT"; then
            echo "diagnostic_exit=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish refresh result to English OS sheet
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          STATUS="diagnostic_exit_${{ steps.diagnostic.outputs.diagnostic_exit || 'unknown' }}"
          SUMMARY_JSON="{}"
          if [ -f diagnostic-summary.json ]; then
            SUMMARY_JSON=$(cat diagnostic-summary.json)
          fi

          node scripts/publish-passages-workflow-result.mjs \
            --status "${STATUS}" \
            --unit "${DIAGNOSTIC_UNIT}" \
            --class "${DIAGNOSTIC_CLASS}" \
            --repository "${GITHUB_REPOSITORY}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --knowledge-path "${KNOWLEDGE_PATH}" \
            --summary-json "${SUMMARY_JSON}"

      - name: Upload refresh diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: passages-vector-refresh-unit-${{ github.event.inputs.diagnostic_unit }}-class-${{ github.event.inputs.diagnostic_class }}
          path: |
            diagnostic.json
            diagnostic-summary.json

      - name: Fail if diagnostic failed
        if: always()
        shell: bash
        run: |
          EXIT_CODE="${{ steps.diagnostic.outputs.diagnostic_exit || '1' }}"
          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Diagnostic failed with exit ${EXIT_CODE}."
            exit 1
          fi
