name: UI Traversal

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to test"
        required: false
        default: "https://english-os-dashboard.vercel.app"
  pull_request:
    branches:
      - main
      - baseline-20260616
  push:
    branches:
      - baseline-20260616

jobs:
  ui-traversal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI traversal tests
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://english-os-dashboard.vercel.app' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
