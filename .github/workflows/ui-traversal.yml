name: UI Traversal

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to test"
        required: false
        default: "coach-pedagogy-restore"
      base_url:
        description: "Deployed URL to test, optional when local mode is used"
        required: false
        default: "http://127.0.0.1:3000"

jobs:
  ui-traversal:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'coach-pedagogy-restore' }}

      - name: Show selected target
        run: |
          echo "Testing ref: ${{ github.event.inputs.ref || 'coach-pedagogy-restore' }}"
          echo "Testing URL: ${{ github.event.inputs.base_url || 'http://127.0.0.1:3000' }}"
          git log -1 --format='%H %s'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build app
        env:
          NEXT_PUBLIC_E2E_DEMO: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_demo"
        run: npm run build

      - name: Run UI traversal tests
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_USE_WEB_SERVER: "1"
          NEXT_PUBLIC_E2E_DEMO: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_demo"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
