name: UI Traversal

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to test"
        required: false
        default: "https://english-os-dashboard.vercel.app"
      run_authenticated:
        description: "Run authenticated traversal if E2E_AUTH_STATE_JSON secret exists"
        required: false
        default: "false"
  pull_request:
    branches:
      - main
      - baseline-20260616
  push:
    branches:
      - baseline-20260616

jobs:
  ui-traversal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Restore authenticated storage state when available
        if: ${{ secrets.E2E_AUTH_STATE_JSON != '' }}
        shell: bash
        run: |
          printf '%s' '${{ secrets.E2E_AUTH_STATE_JSON }}' > auth.json

      - name: Run UI traversal tests
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://english-os-dashboard.vercel.app' }}
          E2E_AUTH_STATE: ${{ secrets.E2E_AUTH_STATE_JSON != '' && 'auth.json' || '' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
