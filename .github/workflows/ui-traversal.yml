name: UI Traversal

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - uiv1

jobs:
  ui-traversal:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build app
        env:
          NEXT_PUBLIC_E2E_DEMO: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsuZGVtbyQ"
          CLERK_SECRET_KEY: "sk_test_dummy"
        run: npm run build

      - name: Start app
        env:
          NEXT_PUBLIC_E2E_DEMO: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsuZGVtbyQ"
          CLERK_SECRET_KEY: "sk_test_dummy"
        run: |
          npm run start -- --hostname 127.0.0.1 > /tmp/english-os.log 2>&1 &
          npx --yes wait-on http://127.0.0.1:3000/coach

      - name: Run UI traversal tests
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_E2E_DEMO: "1"
        run: npm run test:e2e

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: /tmp/english-os.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
