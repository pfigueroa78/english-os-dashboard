name: Auto-regenerate package-lock.json (using PAT)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate package-lock only
        run: |
          npm ci || true
          npm install --package-lock-only

      - name: Commit package-lock.json if changed (using PAT)
        env:
          PAT: ${{ secrets.AUTOCOMMIT_PAT }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "auto-bot"
          git config user.email "auto-bot@users.noreply.github.com"

          # Use the PAT for authentication when pushing
          git remote set-url origin https://x-access-token:${PAT}@github.com/${{ github.repository }}

          # Determine the target branch:
          # - for pull_request events github.head_ref is set (push to the PR head branch)
          # - otherwise use repository ref name (e.g., if run manually)
          if [ -n "${GITHUB_HEAD_REF}" ]; then
            TARGET_REF="refs/heads/${GITHUB_HEAD_REF}"
          else
            TARGET_REF="refs/heads/${GITHUB_REF_NAME}"
          fi

          echo "Target ref: $TARGET_REF"

          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json unchanged"
          else
            git add package-lock.json
            git commit -m "chore: regenerate package-lock.json to match package.json [auto]"
            git push origin HEAD:${TARGET_REF}
          fi
