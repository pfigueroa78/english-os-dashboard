name: Deploy preview to Vercel

on:
  push:
    branches:
      - coach-pedagogy-restore-verified

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel (preview)
        id: vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Comment deployment URL on commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const vercelUrl = process.env.PREVIEW_URL || '';
            const body = vercelUrl
              ? `Preview deployment: ${vercelUrl}`
              : `Vercel deploy finished but URL not found in action outputs. Check Vercel dashboard for this commit.`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body
            });
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.preview_url }}
